<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <meta name="description" content="Trang chủ giới thiệu về Nhật và cộng đồng." />
  <meta name="keywords" content="Nhật, cộng đồng, forum, hình ảnh, video" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h2>MENU</h2>
      <a href="index.html">Home</a>
      <a href="Picture.html">Pictures</a>
      <a href="Video.html">Videos</a>
      <a href="Forum.html">Forum</a>
      <a href="Contact.html">Contact</a>
    </aside>
    <main class="content">

      <div class="modern-card">
        <h1>Liên hệ với chúng tôi</h1>
        <p>Hãy để lại thông tin, chúng tôi sẽ phản hồi sớm nhất có thể.</p>
      </div>

      <form action="#" method="post">
        <label for="name">Tên của bạn</label>
        <input type="text" id="name" name="name" placeholder="Nhập tên..." required>

        <label for="email">Email liên hệ</label>
        <input type="email" id="email" name="email" placeholder="example@mail.com" required>

        <label for="message">Nội dung liên hệ</label>
        <textarea id="message" name="message" rows="5" placeholder="Bạn muốn nói gì..." required></textarea>

        <button type="submit">Gửi Liên Hệ</button>
      </form>

      <div class="modern-card" style="margin-top: 40px;">
        <h1>Đăng ký VIP</h1>
        <p>Trở thành thành viên VIP để xem thêm nhiều video đặc biệt độc quyền.</p>
      </div>

      <form action="#" method="post">
        <label for="vip_name">Tên của bạn</label>
        <input type="text" id="vip_name" name="name" placeholder="Nhập tên đăng ký VIP..." required>

        <label for="vip_email">Email nhận tài khoản</label>
        <input type="email" id="vip_email" name="email" placeholder="Nhập email..." required>

        <label for="plan">Chọn gói VIP</label>
        <select id="plan" name="plan">
          <option value="1month">🌟 VIP 1 tháng - 100k</option>
          <option value="3month">🔥 VIP 3 tháng - 250k</option>
          <option value="12month">👑 VIP 12 tháng - 900k</option>
        </select>

        <label for="payment">Phương thức thanh toán</label>
        <select id="payment" name="payment">
          <option value="momo">Ví MoMo</option>
          <option value="bank">Chuyển khoản Ngân hàng</option>
          <option value="paypal">PayPal</option>
        </select>

        <button type="submit">Xác Nhận Đăng Ký VIP</button>
      </form>

      <!-- Nhạc nền ẩn -->
      <audio id="bg-music" autoplay loop>
        <source src="/sound/1130_1.MP3" type="audio/mpeg">
        Trình duyệt của bạn không hỗ trợ audio.
      </audio>

      <script>
        const audio = document.getElementById("bg-music");
        audio.volume = 0.5;
        document.body.addEventListener("click", () => {
          audio.muted = false; 
        }, { once: true });
      </script>

    </main>
  </div>
</body>
</html>
